[package]
edition = "2021"
name = "tauri-cli-node"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "=3.4"
napi-sys = "=3.0"
napi-derive-backend = "=3.0.0"
napi-derive = "=3.3.0"
tauri-cli = { path = "../../crates/tauri-cli", default-features = false }
log = "0.4.21"

[build-dependencies]
napi-build = "=2.2"

[features]
default = ["tauri-cli/default"]
native-tls = ["tauri-cli/native-tls"]
native-tls-vendored = ["tauri-cli/native-tls-vendored"]
dx-machine-cache = ["tauri-cli/dx-machine-cache"]
dx-machine-cache-mmap = ["dx-machine-cache", "tauri-cli/dx-machine-cache-mmap"]
